<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#0F172A"/>
  <!-- Loudspeaker Enclosure Plastic -->
  <path d="M 80 140 L 320 140 L 320 260 L 260 260 L 240 280 L 160 280 L 140 260 L 80 260 Z" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <!-- Speaker Mesh Grille -->
  <rect x="120" y="170" width="160" height="60" rx="8" fill="#090D16" stroke="#475569" stroke-width="2"/>
  <pattern id="speakerMesh" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
    <circle cx="4" cy="4" r="2" fill="#334155"/>
  </pattern>
  <rect x="124" y="174" width="152" height="52" fill="url(#speakerMesh)"/>
  
  <!-- Copper Contacts -->
  <circle cx="100" cy="230" r="6" fill="#F59E0B"/>
  <circle cx="100" cy="200" r="6" fill="#F59E0B"/>

  <!-- Sound Waves -->
  <path d="M 290 185 A 15 15 0 0 1 290 215" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
  <path d="M 302 175 A 25 25 0 0 1 302 225" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <text x="200" y="330" font-family="monospace" font-size="16" font-weight="bold" fill="#22C55E" text-anchor="middle">OEM LOUDSPEAKER RINGER</text>
  <text x="200" y="355" font-family="sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Bottom Sound Box Module</text>
</svg>
