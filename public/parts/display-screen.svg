<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#0F172A"/>
  <!-- Display Screen Frame -->
  <rect x="130" y="60" width="140" height="250" rx="20" fill="#1E293B" stroke="#EC4899" stroke-width="4"/>
  <!-- Screen Glass Area -->
  <rect x="138" y="75" width="124" height="220" rx="14" fill="#090D16"/>

  <!-- Flex Cable hanging from bottom -->
  <path d="M 180 295 L 180 320 Q 180 330 190 330 L 220 330" fill="none" stroke="#D97706" stroke-width="6"/>
  <rect x="215" y="322" width="16" height="16" fill="#F59E0B" rx="2"/>

  <!-- AMOLED Graphic Glow -->
  <circle cx="200" cy="170" r="40" fill="#EC4899" opacity="0.2" filter="blur(10px)"/>
  <text x="200" y="175" font-family="sans-serif" font-size="14" font-weight="bold" fill="#EC4899" text-anchor="middle">120Hz AMOLED</text>

  <text x="200" y="340" font-family="monospace" font-size="16" font-weight="bold" fill="#EC4899" text-anchor="middle">AMOLED DISPLAY FOLDER</text>
  <text x="200" y="365" font-family="sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Screen &amp; Touch Digitizer Assembly</text>
</svg>
