<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#0F172A"/>
  <!-- Li-ion Battery Block -->
  <rect x="130" y="80" width="140" height="230" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="4"/>
  <!-- Top Connector Flex -->
  <rect x="180" y="65" width="40" height="15" fill="#D97706" rx="3"/>
  <rect x="190" y="60" width="20" height="8" fill="#F59E0B"/>

  <!-- Battery Label Text -->
  <rect x="145" y="100" width="110" height="180" fill="#090D16" rx="8"/>
  <text x="200" y="140" font-family="monospace" font-size="14" font-weight="bold" fill="#3B82F6" text-anchor="middle">Li-ion 3.85V</text>
  <text x="200" y="165" font-family="sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5000 mAh</text>

  <!-- Charge Indicator Icon -->
  <path d="M 205 190 L 190 220 L 202 220 L 195 245 L 212 210 L 200 210 Z" fill="#22C55E"/>

  <text x="200" y="340" font-family="monospace" font-size="16" font-weight="bold" fill="#3B82F6" text-anchor="middle">ORIGINAL BATTERY CELL</text>
  <text x="200" y="365" font-family="sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">OEM Replacement Lithium-Ion</text>
</svg>
