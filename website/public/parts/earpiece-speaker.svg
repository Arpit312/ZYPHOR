<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#0F172A"/>
  <!-- Earpiece Body -->
  <rect x="100" y="160" width="200" height="80" rx="16" fill="#1E293B" stroke="#475569" stroke-width="4"/>
  <!-- Receiver Mesh -->
  <rect x="140" y="185" width="120" height="30" rx="6" fill="#090D16" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="150" y1="200" x2="250" y2="200" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Flex Cable Extension -->
  <path d="M 200 240 L 200 290 L 160 290" fill="none" stroke="#D97706" stroke-width="8"/>
  <rect x="145" y="280" width="20" height="20" fill="#F59E0B" rx="2"/>

  <text x="200" y="340" font-family="monospace" font-size="16" font-weight="bold" fill="#FF6B6B" text-anchor="middle">EARPIECE CALLING SPEAKER</text>
  <text x="200" y="365" font-family="sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Top Call Receiver Module</text>
</svg>
