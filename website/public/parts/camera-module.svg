<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#0F172A"/>
  <!-- Metallic Flex Cable -->
  <path d="M 120 280 L 120 200 Q 120 180 140 180 L 220 180 L 220 220 L 160 220 L 160 280 Z" fill="#D97706" opacity="0.9"/>
  <!-- Gold Pins -->
  <rect x="125" y="270" width="30" height="15" fill="#F59E0B" rx="2"/>
  <line x1="130" y1="270" x2="130" y2="285" stroke="#78350F" stroke-width="2"/>
  <line x1="138" y1="270" x2="138" y2="285" stroke="#78350F" stroke-width="2"/>
  <line x1="146" y1="270" x2="146" y2="285" stroke="#78350F" stroke-width="2"/>

  <!-- Camera Module Housing -->
  <rect x="170" y="100" width="160" height="160" rx="24" fill="#1E293B" stroke="#334155" stroke-width="6"/>
  <!-- Silver Bezel -->
  <circle cx="250" cy="180" r="56" fill="#334155" stroke="#64748B" stroke-width="4"/>
  <!-- Glass Lens Outer -->
  <circle cx="250" cy="180" r="44" fill="#090D16" stroke="#00F0FF" stroke-width="2"/>
  <!-- Inner Lens Reflection -->
  <circle cx="250" cy="180" r="28" fill="#1E1B4B"/>
  <circle cx="250" cy="180" r="16" fill="#312E81"/>
  <circle cx="242" cy="172" r="6" fill="#A5B4FC" opacity="0.8"/>
  <circle cx="256" cy="186" r="3" fill="#6366F1" opacity="0.6"/>

  <!-- Text Label -->
  <text x="200" y="340" font-family="monospace" font-size="16" font-weight="bold" fill="#00F0FF" text-anchor="middle">OEM DUAL CAMERA SENSOR</text>
  <text x="200" y="365" font-family="sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">OIS Sensor-Shift Flex Module</text>
</svg>
