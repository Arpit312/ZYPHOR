<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#0F172A"/>
  <!-- Glass Screen Outline -->
  <rect x="140" y="70" width="120" height="240" rx="28" fill="#1E293B" stroke="#00F0FF" stroke-width="3" opacity="0.9"/>
  <!-- Dynamic Island Notch -->
  <rect x="180" y="85" width="40" height="12" rx="6" fill="#090D16"/>

  <!-- Glass Gloss Reflection -->
  <path d="M 150 90 L 230 90 L 170 290 L 150 290 Z" fill="#FFFFFF" opacity="0.15"/>
  <!-- 9H Shield Badge -->
  <circle cx="200" cy="190" r="32" fill="#00F0FF" opacity="0.2" stroke="#00F0FF" stroke-width="2"/>
  <text x="200" y="196" font-family="sans-serif" font-size="18" font-weight="bold" fill="#00F0FF" text-anchor="middle">9H</text>

  <text x="200" y="340" font-family="monospace" font-size="16" font-weight="bold" fill="#00F0FF" text-anchor="middle">UV 9H TEMPERED GLASS</text>
  <text x="200" y="365" font-family="sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Curved Edge Screen Guard</text>
</svg>
